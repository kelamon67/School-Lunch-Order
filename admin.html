<!DOCTYPE html>
<html>

<head>

<title>Orders Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Lunch Orders</h1>

<div id="orders"></div>

</div>

<script>

async function loadOrders(){

let response = await fetch("https://script.google.com/macros/s/AKfycbwkjUmw3VS2Lf4t7q2vst93SkfvrK1RTX7T7u0NJ_0YVFku21aqyZofjSWDYOD91l7-/exec");

let orders = await response.json();

let html = "";

orders.reverse().forEach(o=>{

html += `

<div class="food">

<h3>${o.food}</h3>

<p>${o.name} - ${o.class}</p>

<p>Price: K${o.price}</p>

<p>Status: ${o.status}</p>

</div>

`;

});

document.getElementById("orders").innerHTML = html;

}

setInterval(loadOrders,3000);

loadOrders();

</script>

</body>

</html>
